<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>French Study Interactive ・ FSF1D</title>
<style>
  :root{
    --bg:#0b0b0d; --panel:#15151a; --panel2:#1b1b21; --line:#2a2a32;
    --ink:#f3f3f5; --muted:#9a9aa6; --red:#ff2e3f; --red-soft:#3a1115;
    --gold:#ffd23f; --gold-soft:#332b0f;
  }
  *{box-sizing:border-box;}
  body{margin:0; color:var(--ink); background:var(--bg);
    font-family:"Trebuchet MS","Segoe UI",system-ui,sans-serif; min-height:100vh;
    background-image:radial-gradient(circle at 12% -10%, #1a1a22 0%, transparent 45%);}
  .lovelo{font-family:"Arial Black",Impact,"Trebuchet MS",sans-serif; text-transform:uppercase;
    letter-spacing:3px; font-weight:900;}
  .streak{position:fixed; top:-30vh; width:2px; height:130vh; z-index:0; opacity:.06; pointer-events:none; animation:drift linear infinite;}
  @keyframes drift{from{transform:translateY(-10vh);}to{transform:translateY(20vh);}}
  header{position:relative; z-index:2; text-align:center; padding:34px 14px 6px;}
  header h1{margin:0; font-size:clamp(28px,6vw,52px); color:var(--ink);}
  header h1 .dot{color:var(--red);}
  header p{margin:8px 0 0; color:var(--gold); font-weight:bold; letter-spacing:2px; font-size:13px;}
  .rule{height:3px; width:90px; margin:14px auto 0; background:linear-gradient(90deg,var(--red),var(--gold));}
  .wrap{max-width:940px; margin:0 auto; padding:0 14px 70px; position:relative; z-index:2;}
  nav.tabs{display:flex; flex-wrap:wrap; gap:8px; justify-content:center; margin:20px 0;}
  nav.tabs button{font-family:"Arial Black",sans-serif; text-transform:uppercase; letter-spacing:1px;
    border:1px solid var(--line); background:var(--panel); color:var(--muted); cursor:pointer;
    padding:9px 12px; border-radius:10px; font-size:11.5px; transition:.15s;}
  nav.tabs button:hover{color:var(--ink); border-color:var(--gold);}
  nav.tabs button.active{background:var(--red); color:#fff; border-color:var(--red);}
  section.panel{display:none; background:var(--panel); border:1px solid var(--line); border-radius:16px;
    padding:24px; box-shadow:0 18px 50px rgba(0,0,0,.5); animation:pop .2s ease;}
  section.panel.active{display:block;}
  @keyframes pop{from{opacity:0; transform:translateY(6px);}to{opacity:1; transform:none;}}
  section.panel h2{margin:0 0 4px; font-size:23px;}
  section.panel h2 .tag{color:var(--red);}
  .count{color:var(--muted); font-size:13px; margin-bottom:12px;}
  .hint{background:var(--panel2); border-left:3px solid var(--gold); padding:11px 14px; border-radius:8px;
    margin:0 0 18px; font-size:14.5px; color:#dcdce2; line-height:1.55;}
  .hint b{color:var(--gold);}
  #accentBar{position:sticky; top:0; z-index:5; display:flex; flex-wrap:wrap; gap:6px;
    background:rgba(10,10,12,.92); backdrop-filter:blur(6px); border-bottom:1px solid var(--line);
    padding:10px; border-radius:0 0 12px 12px; margin-bottom:14px;}
  #accentBar .lbl{color:var(--gold); font-weight:bold; align-self:center; margin-right:4px; font-size:13px; letter-spacing:1px;}
  #accentBar button{min-width:38px; height:38px; border:1px solid var(--line); border-radius:8px; cursor:pointer;
    font-size:18px; font-weight:bold; background:var(--panel2); color:var(--ink); transition:.12s;}
  #accentBar button:hover{background:var(--gold); color:#000; border-color:var(--gold);}
  .q{background:var(--panel2); border:1px solid var(--line); border-radius:12px; padding:14px 16px; margin:12px 0; transition:.15s;}
  .q .prompt{font-weight:bold; margin-bottom:8px; line-height:1.5;}
  .q .sub{font-size:12.5px; color:var(--muted); margin-bottom:8px;}
  .q label{display:block; margin:5px 0; cursor:pointer; color:#dcdce2;}
  .q label:hover{color:var(--ink);}
  input.fr, textarea.fr, select.fr{font-size:16px; padding:9px 11px; border:1px solid var(--line); border-radius:9px;
    font-family:inherit; width:100%; max-width:460px; background:#0e0e12; color:var(--ink);}
  input.fr:focus,textarea.fr:focus,select.fr:focus{outline:none; border-color:var(--gold);}
  .matchrow{display:flex; gap:12px; align-items:center; flex-wrap:wrap;}
  .matchrow .fr-term{font-weight:bold; min-width:150px; color:var(--gold);}
  .q.correct{border-color:var(--gold); background:var(--gold-soft);}
  .q.wrong{border-color:var(--red); background:var(--red-soft);}
  .fb{margin-top:8px; font-weight:bold; font-size:14px;}
  .fb.ok{color:var(--gold);} .fb.no{color:var(--red);}
  button.action{font-family:"Arial Black",sans-serif; text-transform:uppercase; letter-spacing:1px;
    border:none; border-radius:10px; cursor:pointer; padding:13px 20px; color:#fff; font-size:14px;
    background:var(--red); transition:.12s; box-shadow:0 4px 0 #7a0c14;}
  button.action:hover{filter:brightness(1.08);}
  button.action:active{transform:translateY(4px); box-shadow:0 0 0 #7a0c14;}
  button.speak{background:transparent; border:1px solid var(--gold); color:var(--gold);
    padding:8px 13px; border-radius:8px; font-family:"Arial Black",sans-serif; cursor:pointer; font-size:12px; letter-spacing:1px;}
  button.speak:hover{background:var(--gold); color:#000;}
  .scorebox{margin-top:16px; font-family:"Arial Black",sans-serif; font-size:17px; text-align:center;
    padding:13px; border-radius:10px; background:var(--panel2); border:1px solid var(--line); color:var(--ink);}
  .pill{display:inline-block; background:var(--gold); color:#000; border-radius:14px; padding:2px 11px; font-size:12px; font-weight:bold; margin-left:6px;}
  .reading{background:var(--panel2); border:1px solid var(--gold); border-radius:12px; padding:16px; line-height:1.8; color:#ececf0;}
  .passlabel{font-family:"Arial Black",sans-serif; letter-spacing:1px; color:var(--red); font-size:13px; margin:16px 0 6px;}
  footer{text-align:center; color:var(--muted); font-size:13px; padding:22px;}
  footer .accentline{height:2px; width:60px; background:linear-gradient(90deg,var(--red),var(--gold)); margin:0 auto 12px;}
</style>
</head>

function norm(s){return (s||"").trim().toLowerCase().replace(/\s+/g," ").replace(/[.!?]+$/,"").replace(/’/g,"'");}
function speak(text){
  if(!("speechSynthesis"in window)){alert("Your browser doesn't support speech. Try Chrome or Edge.");return;}
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);u.lang="fr-FR";u.rate=.9;
  const v=window.speechSynthesis.getVoices().find(v=>/fr/i.test(v.lang));if(v)u.voice=v;
  window.speechSynthesis.speak(u);
}
if("speechSynthesis"in window){window.speechSynthesis.onvoiceschanged=()=>{};window.speechSynthesis.getVoices();}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}

/* tab definitions: id, label, icon, hint, special(reading) */
const TABDEF=[
 ["present","Présent","⚔","Type the correct <b>present-tense</b> form. Families: <b>-ER</b> (parle…), <b>-IR</b> (finis…), <b>-RE</b> (vends…). Irregulars: être, aller, avoir, faire, vouloir, pouvoir."],
 ["passe","Passé composé","🕰","<b>Past tense:</b> subject + helper (usually <b>avoir</b>) + past participle. -ER→é, -IR→i, -RE→u. Write the full sentence where asked."],
 ["futur","Futur simple","🚀","<b>Future:</b> verb name + endings (-ai, -as, -a, -ons, -ez, -ont). Irregular stems: aller→ir-, faire→fer-, être→ser-, avoir→aur-, pouvoir→pourr-."],
 ["vander","Dr Mrs Vandertramp","🚪","The <b>16 être verbs</b> use ÊTRE as helper. Add <b>-e</b> (female), <b>-s</b> (plural), <b>-es</b> (female plural) to the participle."],
 ["match","Matching","🔗","Match each French word to its English meaning using the drop-down menus."],
 ["fix","Fix the Sentence","🛠","Each sentence has <b>one</b> mistake (conjugation, agreement, negation, contraction, accent, or word order). Rewrite it correctly. Use the accent buttons!"],
 ["adj","Adjectives & BANGS","✏","Make adjectives <b>agree</b>: +e (fem.), +s (masc. pl.), +es (fem. pl.). BANGS adjectives (Beauty, Age, Number, Goodness, Size) go <b>before</b> the noun."],
 ["neg","Negation & Contractions","🚫","<b>ne … pas</b> wrap the verb (or the helper verb in the past). à+le=au, à+les=aux, de+le=du, de+les=des."],
 ["listen","Listening","🎧","Press <b>▶ ÉCOUTER</b> to hear a French phrase (offline, no internet), then choose what you heard. Replay as often as you like."],
 ["read","Reading","📖","Read all three short texts, then answer. You can hear each one read aloud.","reading"],
];

/* build tabs + panels */
const tabsEl=document.getElementById("tabs"), panelsEl=document.getElementById("panels");
const matchPools={};
TABDEF.forEach(([key,label,icon,hint,special],idx)=>{
  const b=document.createElement("button");b.textContent=icon+" "+label;b.onclick=()=>showTab("p-"+key,b);if(idx===0)b.classList.add("active");tabsEl.appendChild(b);
  const sec=document.createElement("section");sec.className="panel"+(idx===0?" active":"");sec.id="p-"+key;
  let head="<h2><span class='tag'>"+icon+"</span> "+label+"</h2><div class='count'>"+SETS[key].length+" questions</div><div class='hint'>"+hint+"</div>";
  if(special==="reading"){
    head+="<div class='passlabel'>TEXTE A — Léa</div><div class='reading'><i>"+READING_A+"</i></div><button class='speak' style='margin:10px 0;' onclick=\"speak(READING_A)\">▶ Écouter le texte A</button>"
        +"<div class='passlabel'>TEXTE B — Marc</div><div class='reading'><i>"+READING_B+"</i></div><button class='speak' style='margin:10px 0;' onclick=\"speak(READING_B)\">▶ Écouter le texte B</button>"
        +"<div class='passlabel'>TEXTE C — Sophie</div><div class='reading'><i>"+READING_C+"</i></div><button class='speak' style='margin:10px 0;' onclick=\"speak(READING_C)\">▶ Écouter le texte C</button>";
  }
  head+="<div id='"+key+"Qs' style='margin-top:8px;'></div>"
      +"<button class='action' onclick=\"checkSet('"+key+"')\">Check answers</button>"
      +"<div class='scorebox' id='"+key+"-score'>Score: —</div>";
  sec.innerHTML=head;panelsEl.appendChild(sec);
});
function showTab(id,btn){document.querySelectorAll("section.panel").forEach(s=>s.classList.remove("active"));document.getElementById(id).classList.add("active");document.querySelectorAll("nav.tabs button").forEach(x=>x.classList.remove("active"));btn.classList.add("active");}

/* accent insertion */
let lastField=null;
document.addEventListener("focusin",e=>{if(e.target.matches("input.fr,textarea.fr"))lastField=e.target;});
document.querySelectorAll("#accentBar button").forEach(btn=>{
  btn.addEventListener("click",()=>{const ch=btn.getAttribute("data-ch");if(!lastField)return;
    const s=lastField.selectionStart??lastField.value.length,e=lastField.selectionEnd??lastField.value.length;
    lastField.value=lastField.value.slice(0,s)+ch+lastField.value.slice(e);
    lastField.focus();const p=s+ch.length;lastField.setSelectionRange(p,p);});
});

/* render each set */
function render(setKey){
  const box=document.getElementById(setKey+"Qs");box.innerHTML="";
  if(setKey==="match"){matchPools[setKey]=shuffle(SETS[setKey].map(q=>q.ans[0]));}
  SETS[setKey].forEach((item,i)=>{
    const d=document.createElement("div");d.className="q";d.id=setKey+"-q"+i;
    let html="";
    if(item.type==="match"){
      html="<div class='matchrow'><span class='fr-term'>"+(i+1)+". "+item.prompt+"</span>"
         +"<select class='fr' style='max-width:260px'><option value=''>— choose meaning —</option>"
         +matchPools[setKey].map(e=>"<option value=\""+e+"\">"+e+"</option>").join("")+"</select></div>";
    } else {
      html="<div class='prompt'>"+(i+1)+". "+(item.prompt||"Listen and choose what you hear:")+"</div>";
      if(item.say){html+="<button class='speak' type='button' onclick=\"speak('"+item.say.replace(/'/g,"\\'")+"')\">▶ Écouter</button><div class='sub'>(press to replay)</div>";}
      if(item.type==="text"){
        html+="<input class='fr' type='text' autocomplete='off' spellcheck='false' placeholder='Réponse…'>";
      } else {
        html+="<div>"+item.opts.map((o,j)=>"<label><input type='radio' name='"+setKey+i+"' value='"+j+"'> "+o+"</label>").join("")+"</div>";
      }
    }
    html+="<div class='fb'></div>";
    d.innerHTML=html;box.appendChild(d);
  });
}
Object.keys(SETS).forEach(render);

if(!("speechSynthesis"in window)){
  ["listen","read"].forEach(k=>{const sc=document.getElementById(k+"-score");if(sc)sc.insertAdjacentHTML("beforebegin","<div style='color:var(--red);font-weight:bold;margin:10px 0;'>⚠ Listening works best in Chrome or Edge.</div>");});
}

/* checking */
function checkSet(setKey){
  const items=SETS[setKey];let correct=0;
  items.forEach((item,i)=>{
    const d=document.getElementById(setKey+"-q"+i),fb=d.querySelector(".fb");
    d.classList.remove("correct","wrong");let ok=false;
    if(item.type==="text"){
      const val=norm(d.querySelector("input.fr").value);
      ok=item.ans.some(a=>norm(a)===val);
      fb.textContent=ok?"✓ Parfait!":"✗ Réponse: "+item.ans[0];
    } else if(item.type==="match"){
      const val=norm(d.querySelector("select").value);
      ok=norm(item.ans[0])===val;
      fb.textContent=ok?"✓ Correct!":"✗ "+item.prompt+" = "+item.ans[0];
    } else {
      const sel=d.querySelector("input[type=radio]:checked");
      const chosen=sel?parseInt(sel.value):-1;ok=chosen===item.correct;
      fb.textContent=ok?"✓ Correct!":"✗ Correct: "+item.opts[item.correct];
    }
    fb.className="fb "+(ok?"ok":"no");
    d.classList.add(ok?"correct":"wrong");
    if(ok)correct++;
  });
  const sb=document.getElementById(setKey+"-score");
  const pct=Math.round(correct/items.length*100);
  let emoji=pct===100?"🏆 PARFAIT!":pct>=80?"🔥 Super!":pct>=50?"💪 Continue!":"📚 Révise encore!";
  sb.innerHTML="Score: "+correct+" / "+items.length+" ("+pct+"%) <span class='pill'>"+emoji+"</span>";
  sb.scrollIntoView({behavior:"smooth",block:"nearest"});
}
